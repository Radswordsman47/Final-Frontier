- type: entity
  id: PartAstrum
  parent: [BaseItem, BasePart]
  name: "astrum body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: _FinalFrontier/Mobs/Species/Astrum/parts.rsi
    shader: unshaded
    unShaded: true
  - type: BodyPart # Shitmed Change
    species: Astrum
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10


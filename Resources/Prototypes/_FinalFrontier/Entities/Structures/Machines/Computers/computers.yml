- type: entity
  parent: [BaseComputerShuttle, BaseShuttleIntercom] # Frontier - BaseShuttleIntercom
  id: ComputerShuttleAltA
  name: shuttle terminal
  description: Used to pilot a shuttle.
  components:
  - type: Sprite
    sprite: _FinalFrontier/Structures/Machines/computers.rsi
    offset: 0,0.5
    noRot: true
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: shuttle
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: Computer
    board: ShuttleConsoleCircuitboard
  # Frontier: shuttle intercom
  - type: UserInterface
    interfaces:
        enum.ShuttleConsoleUiKey.Key:
          type: ShuttleConsoleBoundUserInterface
        enum.IntercomUiKey.Key:
          type: IntercomBoundUserInterface
  - type: ContainerContainer
    containers:
      board: !type:Container
        ents: []
      disk_slot: !type:ContainerSlot {}
      key_slots: !type:Container
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyTraffic
  # End Frontier
  
- type: entity
  id: ComputerSalvageExpeditionAltA
  parent: BaseComputerAiAccess
  name: salvage expeditions terminal
  description: Used to accept salvage missions, if you're tough enough.
  components:
    - type: Sprite
      sprite: _FinalFrontier/Structures/Machines/computers.rsi
      offset: 0,0.5
      noRot: true
      layers:
        - map: ["computerLayerBody"]
          state: computer
        - map: ["computerLayerKeyboard"]
          state: generic_keyboard
        - map: [ "computerLayerScreen" ]
          state: mining
        - map: ["computerLayerKeys"]
          state: mining_key
        - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
          state: generic_panel_open
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.ComputerVisuals.Powered:
          computerLayerScreen:
            True: { visible: true, shader: unshaded }
            False: { visible: false }
          computerLayerKeys:
            True: { visible: true, shader: unshaded }
            False: { visible: true }
        enum.WiresVisuals.MaintenancePanelState:
          enum.WiresVisualLayers.MaintenancePanel:
            True: { visible: false }
            False: { visible: true }
    - type: SalvageExpeditionConsole
    - type: ActivatableUI
      key: enum.SalvageConsoleUiKey.Expedition
    - type: ActivatableUIRequiresPower
    - type: UserInterface
      interfaces:
        enum.SalvageConsoleUiKey.Expedition:
          type: SalvageExpeditionConsoleBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface
    - type: Computer
      board: SalvageExpeditionsComputerCircuitboard
    - type: PointLight
      radius: 1.5
      energy: 1.6
      color: "#b89f25"
    - type: AccessReader
#      access: [["Salvage"]]
    - type: StealTarget
      stealGroup: SalvageExpeditionsComputerCircuitboard
      
- type: entity
  parent: BaseComputer
  id: ComputerSurveillanceCameraMonitorAltA
  name: camera terminal
  description: A surveillance camera terminal. You're watching them. Maybe.
  components:
  - type: Sprite
    sprite: _FinalFrontier/Structures/Machines/computers.rsi
    offset: 0,0.5
    noRot: true
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: cameras
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: Computer
    board: SurveillanceCameraMonitorCircuitboard
  - type: DeviceNetwork
    deviceNetId: Wired
    receiveFrequencyId: SurveillanceCamera
    transmitFrequencyId: SurveillanceCamera
  - type: WiredNetworkConnection
  - type: DeviceNetworkRequiresPower
  - type: SurveillanceCameraMonitor
  - type: ActivatableUI
    key: enum.SurveillanceCameraMonitorUiKey.Key
  - type: ActivatableUIRequiresVision
  - type: Transform
    anchored: true
  - type: UserInterface
    interfaces:
        enum.SurveillanceCameraMonitorUiKey.Key:
          type: SurveillanceCameraMonitorBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface
          

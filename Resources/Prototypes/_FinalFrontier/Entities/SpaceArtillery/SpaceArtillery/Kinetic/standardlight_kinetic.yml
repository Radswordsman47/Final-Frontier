# Spitfire

- type: entity
  id: WeaponTurretSpitfireCannon
  name: L98 "Spitfire" 30mm autocannon
  parent: BallisticArtilleryMagazine
  description: A 30mm ballistic autocannon designed to tear through unarmored targets in space easily. Can be remotely activated or linked up to a GCS.
  components:
  - type: StaticPrice
    price: 750
  - type: Sprite
    sprite: _FinalFrontier/Objects/ShuttleWeapons/spitfire.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: FireControlRotate
  - type: AutoShootGun
  - type: GunSignalControl
  - type: WirelessNetworkConnection
    range: 700
  - type: DeviceLinkSink
    ports:
    - Toggle
  - type: Gun
    fireRate: 0.25
    recoil: 5 # 1/5x
    projectileSpeed: 180
    minAngle: 0
    maxAngle: 5
    burstCooldown: 0.25
    burstFireRate: 6
    shotsPerBurst: 2
    selectedMode: Burst
    availableModes: Burst
    shootThermalSignature: 70000
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/flak_fire.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: SpaceArtillery
    powerChargeRate: 100
    powerUsePassive: 100
  - type: Actions
  - type: CombatMode
    isInCombatMode: true
  - type: Airtight
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine30mm
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine30mm
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 7500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: RadiationBlocker
    resistance: 8
  - type: RadarBlip
    radarColor: "#FF0000"
    scale: 1
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Light
    
# Flares

- type: entity
  id: WeaponTurretFlare
  name: DWI K22 Flare Launcher
  parent: BallisticArtillery
  description: A small device launching flares to trick heat-seeking systems and confuse the enemy.
  components:
  - type: StaticPrice
    price: 500
  - type: Sprite
    sprite: _FinalFrontier/Objects/ShuttleWeapons/flare.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: AmmoCounter
  - type: WirelessNetworkConnection
    range: 700
  - type: GunSignalControl
  - type: Gun
    fireRate: 10
    recoil: 1
    projectileSpeed: 90
    minAngle: 25
    maxAngle: 250
    burstCooldown: 40
    burstFireRate: 10
    shotsPerBurst: 25
    selectedMode: Burst
    availableModes: Burst
    shootThermalSignature: 10000
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rocket_launcher.ogg
    soundEmpty:
      path: /Audio/Weapons/click.ogg
  - type: SpaceArtillery
    powerChargeRate: 50
    powerUsePassive: 60
    powerUseActive: 0
  - type: Actions
  - type: BasicEntityAmmoProvider
    proto: FlareMissile
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2500
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Light
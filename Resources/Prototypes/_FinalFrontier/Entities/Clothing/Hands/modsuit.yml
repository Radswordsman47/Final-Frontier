- type: entity
  parent: ClothingHandsBase
  id: ClothingModsuitGauntletsCoalitionHeavy
  name: coalition heavy modsuit gauntlets
  description: Special modular suit gloves that protect wearer from electric shock.
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Sprite
    sprite: _FinalFrontier/Clothing/Hands/Modsuits/coalition_heavy.rsi
    layers:
    - state: gauntlets
    - state: gauntlets-sealed
      visible: false
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ gloves ]
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10
  - type: MeleeWeapon # Mono edit
    canWideSwing: false
    attackRate: 1
    damage:
      types:
        Blunt: 35
  - type: Insulated
  - type: Fiber
    fiberMaterial: fibers-modular
    fiberColor: fibers-black
  - type: FingerprintMask
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-gauntlets
    sealDownPopup: sealable-clothing-seal-down-gauntlets
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      gloves:
      - state: equipped-HAND-sealed
# DWI15X Stenbryder
        
- type: entity
  parent: ClothingOuterHardsuitBaseNF
  id: ClothingOuterHardsuitDWIStenbryder
  name: DWI-15X stenbryder hardsuit
  description: A heavy industrial hardsuit manufactured by Dornan-Weryl Industrial, suspiciously capable in combat.
  components:
  - type: ToggleableLightVisuals
  - type: PointLight
    enabled: false
    color: "#ffff00"
    radius: 12 # 3->4 Mono
    energy: 6 # 2->3 Mono
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false
  - type: Appearance
  - type: HandheldLight
    addPrefix: true
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        minValue: 0.1
        maxValue: 2.0
        isLooped: true
  - type: Battery
    maxCharge: 600 #lights drain 3/s but recharge of 2 makes this 1/s. Therefore 600 is 10 minutes of light.
    startingCharge: 600
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 2
  - type: Sprite
    sprite: _FinalFrontier/Clothing/OuterClothing/Suits/stenbryder.rsi
  - type: Clothing
    sprite: _FinalFrontier/Clothing/OuterClothing/Suits/stenbryder.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients: 
        Blunt: 0.3
        Slash: 0.4
        Piercing: 0.65
        Heat: 0.1
        Radiation: 0
        Shock: 0.5
        Caustic: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.5
  - type: HeldSpeedModifier
  - type: ToggleableClothing 
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head:  ClothingHeadHelmetHardsuitDWIStenbryder
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: PirateBountyItem 
    id: ClothingOuterHardsuitTacsuit
  - type: StaminaDamageResistance
    coefficient: 0.5

- type: entity
  parent: ClothingHeadHardsuitBase

# Ordnance Platform
    
- type: entity
  parent: NFClothingOuterEVASuitBase
  id: ClothingOuterMobileOrdnance
  name: GTM-98 mobile ordnance platform
  description: The wall.
  components:
  - type: Sprite
    sprite: _FinalFrontier/Clothing/OuterClothing/Suits/mobile_ordnance.rsi
    state: icon
  - type: ClothingSpeedModifier
    walkModifier: 0.4
    sprintModifier: 0.4
  - type: HeldSpeedModifier
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHeavySuit
  - type: Pullable
  - type: MultiHandedItem # Mono
  - type: Item
    size: Ginormous
  - type: Gun
    fireRate: 13
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    recoil: 1 # 1/5x
    projectileSpeed: 80
    maxAngle: 24 # Mono
    minAngle: 3 # Mono
    angleIncrease: 0.4 # Mono
    angleDecay: 2 # Mono
    shootThermalSignature: 5000
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/slammer.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: AmmoCounter
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AmmoBox762x39mmBigFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine762x39mmFMJ
          - Magazine762x39mmBox
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x39mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge762x39mmFMJ
  - type: Clothing
    sprite: _FinalFrontier/Clothing/OuterClothing/Suits/mobile_ordnance.rsi
    state: equipped-OUTERCLOTHING
  - type: ToggleableClothing
    clothingPrototypes:
      head:  ClothingHeadMobileOrdnance
  - type: Armor
    modifiers:
      coefficients: # Mono
        Blunt: 0.25
        Slash: 0.25
        Piercing: 0.2
        Heat: 0.3
        Caustic: 0.5
        Shock: 0.5
        Radiation: 0
        
        

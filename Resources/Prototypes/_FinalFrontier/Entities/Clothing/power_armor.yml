# Frame

- type: entity
  id: BasePowerArmorFrame
  name: power armor frame
  components:
  - type: Sprite
    noRot: true
    drawdepth: Items
    sprite: _FinalFrontier/Clothing/PowerArmor/frame.rsi
    layers:
    - state: icon
    - state: test-chestplate
      map: ["enum.PowerArmorSlotsVisuals.LayerChestplate"]
      visible: true
    - state: test-right-leg
      map: ["enum.PowerArmorSlotsVisuals.LayerRightLeg"]
      visible: true
    - state: test-left-leg
      map: ["enum.PowerArmorSlotsVisuals.LayerLeftLeg"]
      visible: true
    - state: test-right-arm
      map: ["enum.PowerArmorSlotsVisuals.LayerRightArm"]
      visible: true
    - state: test-left-arm
      map: ["enum.PowerArmorSlotsVisuals.LayerLeftArm"]
      visible: true
  - type: Clothing
    slots:
    - outerClothing
    equipSound:
      collection: GenericEquip
    dragEquip: true
    sprite: _FinalFrontier/Clothing/PowerArmor/frame.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
      - state: test-chestplate
        map: ["enum.PowerArmorSlotsVisuals.LayerChestplate"]
        visible: true
      - state: test-right-leg
        map: ["enum.PowerArmorSlotsVisuals.LayerRightLeg"]
        visible: true
      - state: test-left-leg
        map: ["enum.PowerArmorSlotsVisuals.LayerLeftLeg"]
        visible: true
      - state: test-right-arm
        map: ["enum.PowerArmorSlotsVisuals.LayerRightArm"]
        visible: true
      - state: test-left-arm
        map: ["enum.PowerArmorSlotsVisuals.LayerLeftArm"]
        visible: true
  - type: Geiger
    attachedToSuit: true
    showExamine: true # Mono
    isEnabled: false # Mono
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: MovedByPressure
  - type: EmitSoundOnCollide
    sound:
      collection: WeakHit
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Effects/drop.ogg
      params:
        volume: 2
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud
  - type: CollisionWake
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Pullable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3  # fite me
        friction: 0.2
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01
    coolingCoefficient: 0.01
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.65
        Piercing: 0.65
        Heat: 0.5
        Radiation: 0
        Shock: 0.05
  - type: GroupExamine
  - type: HideLayerClothing
    slots:
    - Special
    - Tail
    - Wings
    - Chest
    - Eyes
    - RArm
    - LArm
    - RHand
    - LHand
    - RLeg
    - LLeg
    - RFoot
    - LFoot
    - LArmExtension
    - RArmExtension
  - type: Tag
    tags:
    - Hardsuit
  - type: DragDropTargetable
  - type: DoAfter
  - type: ClothingSpeedModifier
    walkModifier: 1.1
    sprintModifier: 1
  - type: HeldSpeedModifier
  - type: StaminaDamageResistance
    coefficient: 0.1
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHeavySuit
  - type: PowerArmorSlots
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerArmorSlotsVisuals.ContainsChestplate:
        enum.PowerArmorSlotsVisuals.LayerChestplate:
          True: { visible: true }
          False: { visible: false }
      enum.PowerArmorSlotsVisuals.ContainsRightArm:
        enum.PowerArmorSlotsVisuals.LayerRightArm:
          True: { visible: true }
          False: { visible: false }
      enum.PowerArmorSlotsVisuals.ContainsLeftArm:
        enum.PowerArmorSlotsVisuals.LayerLeftArm:
          True: { visible: true }
          False: { visible: false }
      enum.PowerArmorSlotsVisuals.ContainsRightLeg:
        enum.PowerArmorSlotsVisuals.LayerRightLeg:
          True: { visible: true }
          False: { visible: false }
      enum.PowerArmorSlotsVisuals.ContainsLeftLeg:
        enum.PowerArmorSlotsVisuals.LayerLeftLeg:
          True: { visible: true }
          False: { visible: false }
  - type: ContainerContainer
    containers:
      Chestplate: !type:ContainerSlot
      RightLeg: !type:ContainerSlot
      LeftLeg: !type:ContainerSlot
      RightArm: !type:ContainerSlot
      LeftArm: !type:ContainerSlot
  - type: ItemSlots
    slots:
      Chestplate:
        name: Chestplate
        #startingItem: BasePowerArmorChestplate
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 1
        whitelist:
          tags:
          - PowerArmorChestplate
      RightLeg:
        name: Right Leg
        #startingItem: BasePowerArmorRightLeg
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 1
        whitelist:
          tags:
          - PowerArmorRightLeg
      LeftLeg:
        name: Left Leg
        #startingItem: BasePowerArmorLeftLeg
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 1
        whitelist:
          tags:
          - PowerArmorLeftLeg
      RightArm:
        name: Right Arm
        #startingItem: BasePowerArmorRightArm
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 1
        whitelist:
          tags:
          - PowerArmorRightArm
      LeftArm:
        name: Left Arm
        #startingItem: BasePowerArmorLeftArm
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 1
        whitelist:
          tags:
          - PowerArmorLeftArm
        

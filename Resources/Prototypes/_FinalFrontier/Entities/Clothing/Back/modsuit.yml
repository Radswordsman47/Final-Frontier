- type: entity
  parent: [Clothing, ContentsExplosionResistanceBase]
  id: ClothingModsuitCoalitionHeavy
  name: coalition heavy modsuit hardsuit unit
  description: The Coalition's heavy assault modsuit, massively armored whilst still being mobile.
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Goobstation/Clothing/Back/Modsuits/standard.rsi
    layers:
    - state: control
    - state: control-sealed
      visible: false
      shader: unshaded
      map: [ "sealed" ]
  - type: Item
    size: Huge
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Storage
    grid:
    - 0,0,6,3
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:Container
      cell_slot: !type:ContainerSlot
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: UseDelay
    delay: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: ToggleableClothing
    requiredSlot: back
    blockUnequipWhenAttached: true
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingModsuitHelmetCoalitionHeavy
      gloves: ClothingModsuitGauntletsCoalitionHeavy
      outerClothing: ClothingModsuitChestplateCoalitionHeavy
      shoes: ClothingModsuitBootsCoalitionHeavy
  - type: WiresPanel
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        whitelist:
          components:
            - PowerCell
  - type: ItemSlotsRequirePanel
    slots:
      cell_slot: true
  - type: PowerCellDraw
    drawRate: 0.1 # Sealed draw rate
    useRate: 0.5 # Draw rate for sealing
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: false
  - type: DoAfter
  - type: SealableClothingControl
  - type: SealableClothingRequiresPower
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      back:
      - state: equipped-BACKPACK-sealed
  - type: Construction
    graph: Modsuit
    node: standard

- type: entity
  parent: ClothingModsuitCoalitionHeavy
  id: ClothingModsuitCoalitionHeavyPowerCell
  suffix: Antique Power Cell
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellAntiqueProto
        whitelist:
          components:
            - PowerCell

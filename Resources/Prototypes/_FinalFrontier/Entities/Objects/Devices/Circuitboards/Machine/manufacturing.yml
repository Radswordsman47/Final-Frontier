- type: entity
  id: MetalCasterMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: metal caster machine board
  description: A machine printed circuit board for a metal caster.
  components:
    - type: MachineBoard
      prototype: ManufacturingCaster
      requirements: # Frontier
        MatterBin: 4 # Frontier stackRequirements<requirements
        Manipulator: 3 # Frontier stackRequirements<requirements
      stackRequirements:
        Steel: 30
        Plasteel: 15
        

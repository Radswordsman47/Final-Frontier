- type: entity
  parent: SheetMetalBase
  id: FineComponentGun
  name: gun component
  description: A collection of intricate little bits of metal often used in firearms production.
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      GunComponent: 100
  - type: Stack
    stackType: FineComponentGun
    baseLayer: base
    layerStates:
    - guncomp
    - guncomp_2
    - guncomp_3
  - type: Sprite
    sprite: _FinalFrontier/Objects/Materials/gun_component.rsi
    state: guncomp_3
    layers:
    - state: guncomp_3
      map: ["base"]
  - type: Item
    heldPrefix: steel
  - type: Appearance
  - type: Extractable
    grindableSolutionName: GunComponent
  

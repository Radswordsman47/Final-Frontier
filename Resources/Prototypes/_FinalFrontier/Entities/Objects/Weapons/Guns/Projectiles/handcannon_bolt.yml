- type: entity
  id: BulletCoalitionBolt
  parent: BaseBullet
  name: hypervelocity bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    deleteOnCollide: false
    alwaysReflect: true
    damage:
      types:
        Piercing: 30
        Heat: 10
        Shock: 10
        Structural: 200
    armorPenetration: 0.5
  - type: Tracer # Mono
    color: "#FFFFFFFF"
    length: 9
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable

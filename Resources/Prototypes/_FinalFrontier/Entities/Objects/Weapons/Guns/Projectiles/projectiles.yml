- type: entity
  id: BulletCoalitionBolt
  parent: BaseBullet
  name: hypervelocity bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    deleteOnCollide: false
    alwaysReflect: true
    damage:
      types:
        Piercing: 30
        Heat: 10
        Shock: 10
        Structural: 200
    armorPenetration: 0.5
  - type: Tracer # Mono
    color: "#FFFFFFFF"
    length: 9
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable

- type: entity
  id: FlareMissile
  name: Flare
  parent: SparkFlare
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    linearDampening: 5
    deleteOnCollide: false
    damage:
      types:
        Heat: 0
  - type: RadarBlip
    radarColor: "#FFD580"
    scale: 1
    shape: hexagon
  - type: PointLight
    radius: 2
    color: red
    energy: 1
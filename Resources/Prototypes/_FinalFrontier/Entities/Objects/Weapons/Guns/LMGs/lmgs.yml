- type: entity
  name: KR-M44 Eagle (8x65mm SKR)
  parent: [BaseWeaponLightMachineGun, BaseGunWieldable]
  id: WeaponLightMachineGunEagle
  description: One of the most terrifying civillian-available weapons in active production. Uses 8x65mm SKR ammo.
  components:
  - type: Item
    size: Large
    sprite: _FinalFrontier/Objects/Weapons/Guns/LMGs/kr_m44.rsi
  - type: Sprite
    sprite: _FinalFrontier/Objects/Weapons/Guns/LMGs/kr_m44.rsi/icon.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -20
  - type: Gun
    minAngle: 22
    maxAngle: 40
    angleIncrease: 2
    angleDecay: 22
    fireRate: 6
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_FinalFrontier/Weapons/Guns/Gunshots/fire2.ogg
      params:
        volume: -1
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine8x65mmSKRBox
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine8x65mmSKR
          - MagazineBox8x65mmSKR
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge8x65mmSKR
        priority: 1
        whitelist:
          tags:
          - Cartridge8x65mmSKR
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.4
  - type: GunRequiresWield
  - type: Appearance
  - type: Clothing
    sprite: _FinalFrontier/Objects/Weapons/Guns/LMGs/kr_m44.rsi
  - type: StaticPrice
    price: 5000
    vendPrice: 38500
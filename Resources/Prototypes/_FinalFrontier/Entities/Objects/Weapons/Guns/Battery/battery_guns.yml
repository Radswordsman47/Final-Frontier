- type: entity
  name: automatic laser rifle
  parent: [WeaponLaserCarbine, BaseGunWieldable]
  id: WeaponAutoLaserRifle
  description: A civilian grade automatic laser rifle, the bigger brother of the standard laser rifle.
  components:
  - type: Sprite
    sprite: _FinalFrontier/Objects/Weapons/Guns/Battery/automatic_laser_rifle.rsi/icon.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Item
    sprite: _FinalFrontier/Objects/Weapons/Guns/Battery/automatic_laser_rifle.rsi
  - type: Clothing
    sprite: _FinalFrontier/Objects/Weapons/Guns/Battery/automatic_laser_rifle.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: StaticPrice
    price: 800
  - type: Gun
    fireRate: 2.75
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_FinalFrontier/Weapons/Guns/Gunshots/laser1.ogg
  - type: HitscanBatteryAmmoProvider
    proto: RedMediumLaser
    fireCost: 30
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: PowerCageSmall
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
          - PowerCage
  - type: PirateBountyItem # Mono
    id: StandardFactionLongarm
- type: species
  id: Astrum
  name: species-name-astrum
  roundStart: true
  prototype: MobAstrum
  sprites: MobAstrumSprites
  defaultSkinTone: "#b8b8b8"
  markingLimits: MobAstrumMarkingLimits
  dollPrototype: MobAstrumDummy
  skinColoration: Hues

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: MobAstrumSprites
  sprites:
    Special: MobHumanoidAnyMarking
    Head: MobAstrumHead
    Hair: MobHumanoidMarkingMatchSkin
    FacialHair: MobHumanoidMarkingMatchSkin
    Eyes: MobAstrumEye
    Snout: MobHumanoidAnyMarking
    Chest: MobAstrumTorso
    HeadTop: MobHumanoidAnyMarking
    LArm: MobAstrumLArm
    RArm: MobAstrumRArm
    LHand: MobAstrumLHand
    RHand: MobAstrumRHand
    LLeg: MobAstrumLLeg
    RLeg: MobAstrumRLeg
    LFoot: MobAstrumLFoot
    RFoot: MobAstrumRFoot
    Tail: MobHumanoidAnyMarking # Nyanotrasen - Felinid, harpies & Tajaran.
    HeadSide: MobHumanoidAnyMarking # Einstein Engines - Oni

- type: markingPoints
  id: MobAstrumMarkingLimits
  points:
    Special: # the cat ear joke
      points: 0
      required: false
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail: # the cat tail joke
      points: 1
      required: false
    HeadTop:
      points: 1
      required: false
    Chest:
      points: 1
      required: false
    Legs:
      points: 8 # imp 2<8
      required: false
    Arms:
      points: 8 # imp 2<8
      required: false



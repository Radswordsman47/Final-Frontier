# M6A2

- type: entity
  id: WeaponTurretM6A2Machinegun
  name: M6A2 heavy machine gun
  placement:
    mode: SnapgridCenter
  description: A stationary heavy machine gun, typically placed in fortified barricades or on aircraft. Hand operation required.
  components:
  - type: StaticPrice
    price: 180
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/m6a2.rsi
    layers:
    - state: space_artillery
  - type: Appearance
  - type: FireControlRotate
  - type: GunSignalControl
  - type: Anchorable
    delay: 4
  - type: Pullable
  - type: Hands
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Gun
    fireRate: 16
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    recoil: 3 # 1/5x
    projectileSpeed: 90
    maxAngle: 24 # Mono
    minAngle: 3 # Mono
    angleIncrease: 0.4 # Mono
    angleDecay: 2 # Mono
    shootThermalSignature: 5000
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/slammer.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: Actions
  - type: CombatMode
    isInCombatMode: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.1
        density: 360
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - TableLayer
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: AmmoCounter
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AmmoBox762x39mmBigFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine762x39mmFMJ
          - Magazine762x39mmBox
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x39mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge762x39mmFMJ
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 7500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Clickable
  - type: InputMover
  - type: InteractionOutline
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: Strap
    buckleOffset: "0, 0.5"
    position: Stand
    useHand: true
  - type: RadarBlip
    radarColor: "#FF0000"
    visibleFromOtherGrids: false
    scale: 1
